<script>
let uploadedImage = null;

function extractImageFeatures(img) {
    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = img.width;
    canvas.height = img.height;
    ctx.drawImage(img, 0, 0);

    const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;

    let brightness = 0;
    let contrast = 0;
    let edges = 0;

    for (let i = 0; i < data.length; i += 4) {
        const avg = (data[i] + data[i+1] + data[i+2]) / 3;
        brightness += avg;

        if (i > 4) {
            const prev = (data[i-4] + data[i-3] + data[i-2]) / 3;
            contrast += Math.abs(avg - prev);

            if (Math.abs(avg - prev) > 25) edges++;
        }
    }

    const pixels = data.length / 4;

    return {
        brightness: brightness / pixels,
        contrast: contrast / pixels,
        edgeDensity: edges / pixels
    };
}

function runAIAnalysis() {
    const img = new Image();
    img.src = uploadedImage;

    img.onload = () => {
        const f = extractImageFeatures(img);

        // 🧠 Smart scoring model
        let score = 0;

        // Structure intensity (edges = volatility / movement)
        score += Math.min(f.edgeDensity * 400, 30);

        // Contrast (clean moves vs messy chop)
        score += Math.min(f.contrast / 2, 25);

        // Brightness normalization (avoid washed charts)
        score += (f.brightness > 80 && f.brightness < 180) ? 15 : 5;

        // Random micro variation (simulate AI nuance)
        score += Math.random() * 15;

        // Session bonus
        if (marketData.inSession) score += 15;

        score = Math.min(Math.round(score), 100);

        // 🧠 Decision logic
        let quality, action, actionClass;

        if(score >= 85) {
            quality = '⭐ ELITE SETUP';
            action = '✅ TAKE TRADE';
            actionClass = 'bg-success/20 text-success';
        } 
        else if(score >= 70) {
            quality = '✅ HIGH QUALITY';
            action = '✅ VALID SETUP';
            actionClass = 'bg-ai/20 text-ai';
        } 
        else if(score >= 50) {
            quality = '⚠️ MID QUALITY';
            action = '⏱️ WAIT';
            actionClass = 'bg-warning/20 text-warning';
        } 
        else {
            quality = '❌ LOW QUALITY';
            action = '❌ AVOID';
            actionClass = 'bg-danger/20 text-danger';
        }

        // UI update
        scoreValue.textContent = score;
        qualityLabel.textContent = quality;
        actionLabel.textContent = action;
        actionLabel.className = `text-base font-semibold px-4 py-2 rounded-full ${actionClass}`;

        resultsSection.classList.remove('hidden');
    };
}
</script>
