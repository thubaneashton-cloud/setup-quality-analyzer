<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NY Session AI Analyzer</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
    background: #05050F;
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
    padding: 40px;
}
.container {
    max-width: 600px;
    margin: auto;
}
button {
    padding: 15px 30px;
    font-size: 18px;
    background: linear-gradient(to right, #00F0FF, #7928CA);
    border: none;
    color: white;
    border-radius: 10px;
    cursor: pointer;
}
button:disabled {
    opacity: 0.4;
}
img {
    max-width: 100%;
    margin-top: 20px;
}
.result {
    margin-top: 30px;
    font-size: 24px;
}
</style>
</head>

<body>

<div class="container">
    <h1>NY Session AI Analyzer</h1>

    <input type="file" id="fileInput" accept="image/*">
    
    <div>
        <img id="preview" />
    </div>

    <br>

    <button id="analyzeBtn" disabled>Run Analysis</button>

    <div class="result" id="result"></div>
</div>

<script>
let uploadedImage = null;

const fileInput = document.getElementById("fileInput");
const preview = document.getElementById("preview");
const analyzeBtn = document.getElementById("analyzeBtn");
const result = document.getElementById("result");

// Upload image
fileInput.addEventListener("change", (e) => {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = (e) => {
        uploadedImage = e.target.result;
        preview.src = uploadedImage;
        analyzeBtn.disabled = false;
        result.innerHTML = "";
    };
    reader.readAsDataURL(file);
});

// Extract image data
function extractImageFeatures(img) {
    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = img.width;
    canvas.height = img.height;
    ctx.drawImage(img, 0, 0);

    const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;

    let brightness = 0;
    let contrast = 0;
    let edges = 0;

    for (let i = 0; i < data.length; i += 4) {
        const avg = (data[i] + data[i+1] + data[i+2]) / 3;
        brightness += avg;

        if (i > 4) {
            const prev = (data[i-4] + data[i-3] + data[i-2]) / 3;
            const diff = Math.abs(avg - prev);

            contrast += diff;

            if (diff > 25) edges++;
        }
    }

    const pixels = data.length / 4;

    return {
        brightness: brightness / pixels,
        contrast: contrast / pixels,
        edgeDensity: edges / pixels
    };
}

// Session check
function isNYSession() {
    const now = new Date();
    const minutes = now.getUTCHours() * 60 + now.getUTCMinutes();
    return minutes >= (14*60+30) && minutes <= (16*60);
}

// Main analysis
analyzeBtn.addEventListener("click", () => {
    const img = new Image();
    img.src = uploadedImage;

    img.onload = () => {
        const f = extractImageFeatures(img);

        let score = 0;

        // Movement strength
        score += Math.min(f.edgeDensity * 400, 30);

        // Clean vs messy
        score += Math.min(f.contrast / 2, 25);

        // Visual clarity
        score += (f.brightness > 80 && f.brightness < 180) ? 15 : 5;

        // Session boost
        if (isNYSession()) score += 15;

        // slight variation
        score += Math.random() * 10;

        score = Math.min(Math.round(score), 100);

        let verdict = "";
        if(score >= 85) verdict = "ELITE SETUP ✅";
        else if(score >= 70) verdict = "VALID SETUP 👍";
        else if(score >= 50) verdict = "WAIT ⏱️";
        else verdict = "AVOID ❌";

        result.innerHTML = `
            Score: <b>${score}%</b><br>
            ${verdict}
        `;
    };
});
</script>

</body>
</html>
